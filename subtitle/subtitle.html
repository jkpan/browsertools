<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" charset="UTF-8">
  <!-- <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+Mono+TC&family=Mochiy+Pop+One&family=Noto+Serif+TC:wght@200..900&family=Shippori+Antique+B1&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../ui_green.css" />
  <style>
    body {
      margin: 0px;
      height: 100%;
      overflow: hidden;
      background-color: transparent;
    }

    .fullbg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    main {
      position: fixed;
      width: 100%;
      height: 100%;
    }

    ::-webkit-scrollbar {
      display: none;
    }

    .ctrlButton {
      background-color: transparent;
      border-color: #00ff00;
      color: rgb(0, 255, 0);
      border-radius: 4px;
      opacity: 0.33;
      position: fixed;
      z-index: 100;
    }


/* 半透明背景 */
.loading-screen {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 轉圈圈 */
.spinner {
    width: 60px;
    height: 60px;
    border: 6px solid rgba(200, 200, 200, 0.5);
    border-top: 6px solid #ff5555;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}

/* 動畫 */
@keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
}

  </style>
</head>

<body>
  <div class="fullbg" id="image_container"></div>
  <button id="ctrlBtn" class="ctrlButton" style="top:10px;right:10px;" onclick="createCtrlBtn()">-</button>
  <div id="smlctrl" hidden="true">
    <button id="pptButton" class="ctrlButton"
      style="opacity: 1.0;top:10px;left:10px;font-size: 20px;background: #b74b2e;color:white;border-color: white;"
      onclick="generatePPT()">下載PPT</button>
    <button class="ctrlButton"
      style="opacity: 1.0;top:60px;left:10px;font-size: 20px;background:black;color:white;border-color: white;"
      onclick="switchFontColor()">字顏色(黑白)</button>
    <button class="ctrlButton"
      style="opacity: 1.0;top:110px;left:10px;font-size: 20px;background:black;color:white;border-color: white;"
      onclick="switchFontFamily()">字型</button>
    <button class="ctrlButton"
      style="opacity: 1.0;top:160px;left:10px;font-size: 20px;background:black;color:white;border-color: white;"
      onclick="fontSizeAdd()">字大</button>
    <button class="ctrlButton"
      style="opacity: 1.0;top:210px;left:10px;font-size: 20px;background:black;color:white;border-color: white;"
      onclick="fontSizeSub()">字小</button>
    <button class="ctrlButton"
      style="opacity: 1.0;top:260px;left:10px;font-size: 20px;background:black;color:white;border-color: white;"
      onclick="openFile()">背景圖</button>
    <button id="jsonButton" class="ctrlButton"
      style="opacity: 1.0;top:310px;left:10px;font-size: 20px;background: #b74b2e;color:white;border-color: white;"
      onclick="generateJson()">下載Json</button>
    <input id="bgfile" type="file" name="file" hidden="true" accept="image/*" onchange="selectFile(event)" />
    <label class="ctrlButton" style="opacity: 1.0;top:360px;left:10px;font-size: 20px;background-color: black;color: white;">
      切歌1,2,3,... <br>方向鍵上下切段落
    </label>
  </div>
  <div class="loading-screen" id="busy">
    <div class="spinner"></div>
  </div>
</body>

</html>
<script type="text/javascript" src="../utilities.js"></script>
<script type="text/javascript" src="../led/led.js" charset="UTF-8"></script>

<script>

  function openFile() {
    document.getElementById('bgfile').click();
  }

  function selectFile(event) {
    let file = event.target.files[0];
    var reader = new FileReader();
    // 读取文件内容
    reader.onload = function (event) {
      image_base64 = event.target.result;
      showImage(image_base64);
    };
    reader.readAsDataURL(file);
  }

  function fontSizeAdd() {
    setFontFactor(fontfactor - 0.5);
    _repaint();
  }

  function fontSizeSub() {
    setFontFactor(fontfactor + 0.5);
    _repaint();
  }

  function switchFontColor() {
    keyboard({ code: 'KeyC' });
  }

  function switchFontFamily() {
    keyboard({ code: 'KeyF' });
  }

  function createImage() {
    // 轉成 base64
    return canvas.toDataURL("image/png");
  }

  function generateJson() {
    let str = JSON.stringify(toObj(), null, "\t");
    console.log(str);
    var downloadLink = document.createElement("a");
    downloadLink.setAttribute("href", "data:text/plain;charset=utf-8," + str);
    downloadLink.setAttribute("download", "songs.json"); // 设置下载文件的名称，此处为myFile.txt
    // 4. 使用JavaScript模拟用户点击下载链接，从而触发下载
    downloadLink.click();
  }

  async function _genPPT() {

    let images = [];

    let total = 100;

    for (let t = 1; t < SONGS.length; t++) {
      setTimeout(() => {
        songswitch(t, false);
        console.log('switch to song : ' + song);
      }, total);
      total += 100;
      for (let i = 0; i < SONGS[t].length; i++) {
        setTimeout(() => {
          images.push(createImage());
          console.log("#####");
          for (let l = 0; l < SONGS[t][phase].length; l++) console.log(SONGS[t][phase][l]);
          keyboard({ code: 'ArrowDown', keyCode: 40 });
        }, total);
        total += 100;
        //for (let j = 0; j < subtitles[phase].length; j++) console.log(subtitles[phase][j]);
        //console.log("===== phase =====");
      }
      console.log("===== song =====");
    }

    total += 100;

    setTimeout(() => {
      const pptx = new PptxGenJS();

      images.forEach((img) => {
        let slide = pptx.addSlide();
        slide.addImage({
          data: img,
          x: 0,
          y: 0,
          w: "100%",
          h: "100%"
        });
      });

      pptx.writeFile("songs.pptx");

      drawBg2Canvas = null;
      _repaint();

      document.getElementById('busy').style.display = "none";

    }, total);


  }

  async function generatePPT() {

    //document.getElementById('busy').hidden = false;
    document.getElementById('busy').style.display = "flex";

    if (image_base64) {
      drawBg2Canvas = new Image(); //drawBg2Canvas.onload = function () {  ctx.drawImage(img, 0, 0); };
      drawBg2Canvas.src = image_base64;
    }

    mode = 2;
    displayProgress = 0;
    _repaint();

    let elapse = await reloadFont();
    
    setTimeout(()=>{
      _genPPT();
    }, elapse + 50);

  }

  if (readParam('action') === 'ppt') {

    mode = 2;
    displayProgress = 0;
    fontColorType = 1;
    _repaint();

    window.addEventListener("beforeunload", function (event) {
      window.opener.subtitleClose();
    });

    document.getElementById("ctrlBtn").remove();
    document.getElementById("smlctrl").hidden = false;
    document.getElementById('busy').style.display = "none";
    
  } else {
    document.getElementById('busy').remove();
    document.getElementById("smlctrl").remove();
  }
