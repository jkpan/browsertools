<body>
  <div class="fullbg" id="image_container"></div>
  <button class="ctrlButton" style="top:10px;right:10px;" onclick="createCtrlBtn()">-</button>
  <button id="pptButton" hidden="true" class="ctrlButton"
    style="opacity: 1.0;top:10px;left:10px;font-size: 20px;background: #b74b2e;color:white;border-color: white;"
    onclick="generatePPT()">下載PPT</button>
  <button id="jsonButton" hidden="true" class="ctrlButton"
    style="opacity: 1.0;bottom:10px;left:10px;font-size: 20px;background: #b74b2e;color:white;border-color: white;"

<script>
  function createImage() {
    // 轉成 base64
    return canvas.toDataURL("image/png");
  }

  function generateJson() {
    let str = JSON.stringify(toObj(), null, "\t");
    console.log(str);
    var downloadLink = document.createElement("a");
    downloadLink.setAttribute("href", "data:text/plain;charset=utf-8," + str);
    downloadLink.setAttribute("download", "songs.json"); // 设置下载文件的名称，此处为myFile.txt
    // 4. 使用JavaScript模拟用户点击下载链接，从而触发下载
    downloadLink.click();
  }

  async function generatePPT() {

    if (image_base64) {
      drawBg2Canvas = new Image();
      //drawBg2Canvas.onload = function () {  ctx.drawImage(img, 0, 0); };
      drawBg2Canvas.src = image_base64;
    }

    mode = 2;
    _repaint();

    for (let t = 1; t < SONGS.length; t++) {
      songswitch(t, false);
      for (let i = 0; i < subtitles.length; i++) {
        keyboard({ code: 'ArrowDown', keyCode: 40 });
      }
    }

    let images = [];

    for (let t = 1; t < SONGS.length; t++) {
      songswitch(t, false);
      for (let i = 0; i < subtitles.length; i++) {
        for (let j = 0; j < subtitles[phase].length; j++) {
          console.log(subtitles[phase][j]);
        }
        console.log("===== phase =====");
        images.push(createImage());
        keyboard({ code: 'ArrowDown', keyCode: 40 });
      }
      console.log("===== song =====");
    }

    const pptx = new PptxGenJS();

    images.forEach((img) => {
      let slide = pptx.addSlide();
      slide.addImage({
        data: img,
        x: 0,
        y: 0,
        w: "100%",
        h: "100%"
      });
    });

    // 下載
    pptx.writeFile("songs.pptx");

    drawBg2Canvas = null;
    _repaint();

    /*
    console.log(':' + SONGS.length);
    for (let t = 0; t < SONGS.length; t++) {
      subtitles = SONGS[t];
      for (let i = 0; i < subtitles.length; i++) {
        for (let j = 0; j < subtitles[i].length; j++) {
          console.log(subtitles[i][j]);
        }
        console.log("===== phase =====");
      }
      console.log("===== song =====");
    }
    */

    return;
  }

  if (readParam('action') === 'ppt') {

    mode = 2;
    displayProgress = 0;
    fontColorType = 1;
    _repaint();

    window.addEventListener("beforeunload", function (event) {
      window.opener.subtitleClose();
    });

    document.getElementById("pptButton").hidden = false;
    document.getElementById("jsonButton").hidden = false;

  }
